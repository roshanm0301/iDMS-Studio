name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  studio:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: studio/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
